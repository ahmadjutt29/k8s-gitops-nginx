<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad Shakeel — GitOps Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      text-align: center;
      padding: 60px 80px;
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      max-width: 600px;
      width: 90%;
    }
    .avatar {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 20px;
      box-shadow: 0 0 40px rgba(0,180,216,0.4);
    }
    h1 { font-size: 46px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 16px; color: #00b4d8; margin-bottom: 36px; text-transform: uppercase; letter-spacing: 1px; }
    .badges { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 36px; }
    .badge { padding: 7px 18px; border-radius: 50px; font-size: 12px; font-weight: 700; }
    .b1 { background: rgba(0,180,216,0.15);  border: 1px solid #00b4d8; color: #00b4d8; }
    .b2 { background: rgba(46,204,113,0.15); border: 1px solid #2ecc71; color: #2ecc71; }
    .b3 { background: rgba(155,89,182,0.15); border: 1px solid #9b59b6; color: #9b59b6; }
    .b4 { background: rgba(230,126,34,0.15); border: 1px solid #e67e22; color: #e67e22; }
    .b5 { background: rgba(231,76,60,0.15);  border: 1px solid #e74c3c; color: #e74c3c; }
    .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 36px; }
    .item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px 10px; font-size: 13px; color: #aaa; }
    .item b { display: block; color: white; font-size: 14px; margin-top: 4px; }
    .status { display: inline-flex; align-items: center; gap: 8px; background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); border-radius: 50px; padding: 10px 24px; font-size: 13px; color: #2ecc71; margin-bottom: 24px; }
    .dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.4)} }
    .footer { font-size: 12px; color: rgba(255,255,255,0.3); border-top: 1px solid rgba(255,255,255,0.07); padding-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👤</div>
    <h1>Ahmad</h1>
    <p class="subtitle">DevOps Engineer</p>
    <div class="badges">
      <span class="badge b1">Kubernetes</span>
      <span class="badge b2">GitOps</span>
      <span class="badge b3">ArgoCD</span>
      <span class="badge b4">Rancher</span>
      <span class="badge b5">Traefik</span>
    </div>
    <div class="grid">
      <div class="item">☁️ Cloud <b>DigitalOcean</b></div>
      <div class="item">⚙️ K8s <b>K3s</b></div>
      <div class="item">🐄 Mgmt <b>Rancher</b></div>
      <div class="item">🔄 GitOps <b>ArgoCD</b></div>
      <div class="item">🌐 Ingress <b>Traefik</b></div>
      <div class="item">📦 Server <b>NGINX</b></div>
    </div>
    <div class="status">
      <div class="dot"></div>
      Live — Deployed via GitOps
    </div>
    <div class="footer">Every change to this page is a git push — no manual deployments</div>
  </div>
</body>
</html>
